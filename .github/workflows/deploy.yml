name: Sync R2 and Deploy to Cloudflare Pages

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Sync from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          node sync-r2.mjs
          ls -R content/

      - name: Ensure Index File
        run: |
          if [ ! -f content/index.md ]; then
            echo "# My Quartz Garden" > content/index.md
          fi

      - name: Build Quartz
        run: node quartz/bootstrap-cli.mjs build

      - name: Verify Public Directory
        run: |
          if [ ! -d "public" ]; then
            echo "❌ ERROR: public directory not found!"
            exit 1
          fi
          ls -F public/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }} --commit-dirty=true
